services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: hub
      POSTGRES_DB: hub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: cmd/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://hub:hub@postgres:5432/hub?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  ws-gateway:
    build:
      context: .
      dockerfile: cmd/ws-gateway/Dockerfile
    ports:
      - "8081:8081"
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_started

  event-collector-uptime:
    build:
      context: .
      dockerfile: cmd/event-collector-uptime/Dockerfile
    environment:
      DATABASE_URL: postgres://hub:hub@postgres:5432/hub?sslmode=disable
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  event-writer:
    build:
      context: .
      dockerfile: cmd/event-writer/Dockerfile
    environment:
      DATABASE_URL: postgres://hub:hub@postgres:5432/hub?sslmode=disable
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  pgdata:
